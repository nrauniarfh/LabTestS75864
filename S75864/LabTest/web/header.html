<!DOCTYPE html>
<html>
<head>
    <title>DriveSmart Integrated Academy</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f6f9;
        }

        h1{
            color: #2c3e50;
        }

        h2{
            color: #34495e;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        th{
            background-color: #3498db;
            color: white;
            padding: 10px;
        }

        td{
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even){
            background-color: #f2f2f2;
        }

        a{
            display: inline-block;
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover{
            background-color: #2980b9;
        }

        hr{
            margin: 20px 0;
        }

        .footer{
            text-align: center;
            color: gray;
            margin-top: 20px;
        }
    </style>
</head>
<body>
